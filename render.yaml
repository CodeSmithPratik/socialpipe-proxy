services:
  - type: web
    name: ollama-key-proxy
    env: node
    buildCommand: ""
    startCommand: node index.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: ADMIN_PASSWORD
        sync: false
      - key: OPENAI_OLLAMA_API_KEYS
        sync: false
      - key: OPENAI_OLLAMA_BASE_URL
        value: https://ollama.com
      - key: RENDER_SERVICE_ID
        value: srv-d8q1fn8js32c738mrsv0
      - key: RENDER_API_KEY
        sync: false
